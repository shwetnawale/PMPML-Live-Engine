<!DOCTYPE html>
<html>
<head>
    <title>CitySaarthi | PMPML Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        .nav { background: #004a99; padding: 15px; color: white; display: flex; gap: 10px; align-items: center; }
        #map { height: calc(100vh - 80px); width: 100%; }
        #dash { position: absolute; top: 100px; left: 20px; z-index: 1000; background: white; width: 300px; padding: 15px; border-radius: 8px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .control-panel { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 5px; display: flex; align-items: center; gap: 10px; margin-left: auto; }
        button { cursor: pointer; padding: 8px; border-radius: 4px; border: none; font-weight: bold; }
        input { padding: 10px; border-radius: 5px; border: none; width: 220px; }
    </style>
</head>
<body>
    <div class="nav">
        <input list="r-list" id="rSearch" placeholder="🚍 Search Bus No..." onchange="updateBus()">
        <datalist id="r-list">{% for r in routes %}<option value="{{r.route_id}}">{{r.display}}</option>{% endfor %}</datalist>

        <div class="control-panel">
            <button id="locModeBtn" onclick="toggleLocationMode()" style="background: #ffc107;">📍 Mode: GPS</button>
            <button id="playBtn" onclick="toggleSim()" style="background: #28a745; color: white;">▶ Play</button>
            <b id="clock-val" style="font-family: monospace; font-size: 18px;">{{current_time}}</b>
        </div>
    </div>

    <div id="dash">
        <h4 id="dash-title" style="margin:0 0 5px 0; color: #004a99;">📍 Nearby Stop</h4>
        <div id="walk-dist" style="font-size: 12px; color: #666; font-weight: bold; margin-bottom: 8px;"></div>
        <div id="results">Finding location...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
