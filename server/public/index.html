<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMPML | Passenger Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-50">
    <div class="bg-[#2f4858] p-6 text-white shadow-xl flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase">PMPML LIVE</h1>
        <div id="status" class="text-[10px] text-orange-400 font-bold uppercase tracking-widest italic">● Syncing...</div>
    </div>

    <div id="map" class="h-[65vh] w-full border-b-4 border-orange-500 shadow-inner"></div>

    <div class="p-6 text-center">
        <div class="bg-white rounded-3xl p-6 shadow-2xl border border-slate-100">
            <h2 id="bus-id" class="text-xl font-black text-slate-800">Searching...</h2>
            <p id="route-info" class="text-sm text-slate-400 mb-4 italic">Wait for broadcast</p>
            <span id="speed" class="text-3xl font-black text-[#2f4858]">0 KM/H</span>
        </div>
    </div>

    <script>
        // Replace this with your HTTPS ngrok URL each time ngrok restarts.
        const API_URL = "https://7324-103-17-157-5.ngrok-free.app";
        const TARGET_BUS = "BUS-39";

        const map = L.map('map').setView([18.7302, 73.6745], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const busIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
            iconSize: [45, 45]
        });

        let marker = L.marker([18.7302, 73.6745], { icon: busIcon }).addTo(map);

        async function sync() {
            try {
                const res = await fetch(`${API_URL}/api/bus-location?bus_id=${TARGET_BUS}`);
                if (!res.ok) {
                    throw new Error('API unavailable');
                }

                const data = await res.json();
                marker.setLatLng([data.lat, data.lng]);
                map.panTo([data.lat, data.lng]);

                const status = document.getElementById('status');
                status.innerText = '● LIVE SYSTEM SYNCED';
                status.classList.remove('text-orange-400');
                status.classList.add('text-emerald-400');

                document.getElementById('bus-id').innerText = data.bus_id || 'Unknown Bus';
                document.getElementById('route-info').innerText = data.route || 'Route unavailable';
                document.getElementById('speed').innerText = `${data.speed || 0} KM/H`;
            } catch (e) {
                const status = document.getElementById('status');
                status.innerText = '● RECONNECTING...';
                status.classList.remove('text-emerald-400');
                status.classList.add('text-orange-400');
            }
        }

        sync();
        setInterval(sync, 3000);
    </script>
</body>
</html>
