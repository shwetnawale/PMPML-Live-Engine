<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CitySaarthi | Connector</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-white to-emerald-50 font-sans antialiased text-slate-900">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-8 sm:px-6">
        <section class="w-full rounded-[28px] border border-slate-200 bg-white p-7 shadow-[0_24px_60px_rgba(15,23,42,0.1)] sm:p-10">
            <div class="mb-6">
                <p class="text-[11px] font-bold uppercase tracking-[0.28em] text-emerald-600">CitySaarthi Bridge</p>
                <h1 class="mt-2 text-3xl font-black tracking-tight text-slate-800">Passenger UI Launcher</h1>
                <p class="mt-2 text-sm text-slate-600">This page connects GitHub Pages to your live broker. The full passenger UI is <span class="font-semibold text-slate-800">home.html</span>.</p>
            </div>

            <label for="engine-url" class="mb-2 block text-xs font-bold uppercase tracking-[0.24em] text-slate-500">HTTPS Engine URL</label>
            <input id="engine-url" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm font-semibold text-slate-800 outline-none ring-emerald-400 focus:border-emerald-400 focus:ring" placeholder="https://xxxx.ngrok-free.app" />

            <div class="mt-5 flex flex-wrap gap-3">
                <button id="open-home" class="rounded-xl bg-[#2f4858] px-5 py-3 text-xs font-black uppercase tracking-[0.18em] text-white transition hover:bg-[#243846]">Open Passenger Home</button>
                <button id="check-link" class="rounded-xl border border-slate-300 bg-white px-5 py-3 text-xs font-black uppercase tracking-[0.18em] text-slate-700 transition hover:bg-slate-50">Check Broker</button>
            </div>

            <div id="conn-state" class="mt-6 rounded-xl bg-slate-100 px-4 py-3 text-xs font-bold uppercase tracking-[0.18em] text-slate-500">Status: waiting</div>

            <ol class="mt-6 list-decimal space-y-2 pl-5 text-sm text-slate-600">
                <li>Start broker server on laptop.</li>
                <li>Start ngrok with HTTPS tunnel.</li>
                <li>Paste ngrok HTTPS URL above.</li>
                <li>Click Open Passenger Home.</li>
            </ol>
        </section>
    </main>

    <script>
        const DEFAULT_ENGINE_URL = 'https://1977-103-17-157-5.ngrok-free.app';

        const input = document.getElementById('engine-url');
        const state = document.getElementById('conn-state');
        const stored = localStorage.getItem('CITYSAARTHI_ENGINE_URL');

        input.value = stored || DEFAULT_ENGINE_URL;

        function normalizedUrl() {
            return (input.value || '').trim().replace(/\/$/, '');
        }

        function setState(text, tone) {
            state.innerText = text;
            state.className = `mt-6 rounded-xl px-4 py-3 text-xs font-bold uppercase tracking-[0.18em] ${tone === 'ok' ? 'bg-emerald-100 text-emerald-700' : tone === 'bad' ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-500'}`;
        }

        async function checkBroker() {
            const engine = normalizedUrl();
            if (!engine.startsWith('https://')) {
                setState('Status: use HTTPS ngrok URL', 'bad');
                return;
            }

            setState('Status: checking broker...', 'idle');
            try {
                const response = await fetch(`${engine}/health`);
                if (!response.ok) throw new Error('offline');
                setState('Status: broker connected', 'ok');
            } catch (_err) {
                setState('Status: broker not reachable', 'bad');
            }
        }

        document.getElementById('check-link').addEventListener('click', checkBroker);
        document.getElementById('open-home').addEventListener('click', () => {
            const engine = normalizedUrl();
            if (!engine.startsWith('https://')) {
                setState('Status: use HTTPS ngrok URL', 'bad');
                return;
            }

            localStorage.setItem('CITYSAARTHI_ENGINE_URL', engine);
            window.location.href = `./cep%202/home.html?engine=${encodeURIComponent(engine)}`;
        });

        if (input.value) {
            checkBroker();
        }
    </script>
</body>
</html>
