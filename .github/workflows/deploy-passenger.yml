name: Deploy Passenger App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Passenger/**"
      - ".github/workflows/deploy-passenger.yml"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Passenger folder to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Passenger
          publish_branch: gh-pages
          force_orphan: true
