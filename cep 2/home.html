<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CitySaarthi | Passenger Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-50 font-sans">

    <div class="p-6 bg-[#2f4858] text-white shadow-lg">
        <h1 class="text-2xl font-bold italic">CitySaarthi</h1>
        <p id="status-text" class="text-sm text-emerald-400">● Checking for live buses...</p>
    </div>

    <div id="map" class="h-[60vh] w-full shadow-inner"></div>

    <div class="p-6">
        <div id="info-card" class="bg-white p-5 rounded-2xl shadow-md border border-slate-100">
            <h2 id="bus-id-display" class="text-xl font-bold text-slate-800">No Bus Selected</h2>
            <p id="route-display" class="text-slate-500 mb-4">Please wait for tracking to start...</p>
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                <span class="text-sm font-medium text-slate-400 uppercase">Live Speed</span>
                <span id="speed-display" class="text-2xl font-black text-[#2f4858]">0 KM/H</span>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS with your NGROK link after starting ngrok
        const API_BASE = "https://1c14-103-17-157-5.ngrok-free.app"; 
        const TRACK_BUS_ID = "BUS-39"; // Ensure this matches your Flutter input

        const map = L.map('map').setView([18.7302, 73.6745], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const busIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
            iconSize: [45, 45]
        });

        let marker = L.marker([0, 0], { icon: busIcon }).addTo(map);

        async function refreshLocation() {
            try {
                const res = await fetch(`${API_BASE}/api/bus-location?bus_id=${TRACK_BUS_ID}`);
                if (!res.ok) throw new Error("Offline");

                const data = await res.json();
                const pos = [data.lat, data.lng];

                marker.setLatLng(pos);
                map.panTo(pos);

                document.getElementById('status-text').innerText = "● Live Tracking Active";
                document.getElementById('bus-id-display').innerText = data.bus_id;
                document.getElementById('route-display').innerText = data.route;
                document.getElementById('speed-display').innerText = `${data.speed} KM/H`;

            } catch (err) {
                document.getElementById('status-text').innerText = "● Bus is currently offline";
                document.getElementById('status-text').classList.replace('text-emerald-400', 'text-red-400');
            }
        }

        setInterval(refreshLocation, 3000); // 3-second sync
    </script>
</body>
</html>
